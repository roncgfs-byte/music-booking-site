<!DOCTYPE html>
<html>
<head>
  <title>Artist Booking Preferences</title>
</head>
<form name="artist-preferences" method="POST" data-netlify="true">
<input type="hidden" name="form-name" value="artist-preferences">
  
<body style="font-family: Arial; text-align: center;">

<div style="max-width: 600px; margin: auto; text-align: left;">

  <div style="text-align:center;">
    <h1>Artist Booking Details</h1>
    <p>Provide additional information to help us match you with the right venues.</p>
  </div>

  <h3>Performance Details</h3>
  <p>
    <label>Set Length:<br>
    <input type="text" name="set_length"></label>
  </p>

  <p>
    <label>Band Size:<br>
    <input type="text" name="band_size"></label>
  </p>

  <h3>Booking Preferences</h3>
  <p>
    <label>Preferred Venue Types:<br>
    <input type="text" name="venues"></label>
  </p>

  <p>
    <label>Travel Willingness:<br>
    <input type="text" name="travel"></label>
  </p>

  <h3>Rates</h3>
  <p>
    <label>Typical Rate:<br>
    <input type="text" name="rate"></label>
  </p>

  <h3>Availability</h3>
  <p>
    <label>Available Dates / Schedule:<br>
    <input type="text" name="availability"></label>
  </p>

  <h3>Technical Requirements</h3>
  <p>
    <label>Sound / Equipment Needs:<br>
    <textarea name="tech"></textarea></label>
  </p>

  <h3>Experience</h3>
  <p>
    <label>Past Performances or Notes:<br>
    <textarea name="experience"></textarea></label>
  </p>

</div>
 <p>
  <button type="submit">Submit Details</button>
</p>

</form>
</body>
</html>
