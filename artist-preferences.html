<!DOCTYPE html>
<html>
<head>
  <title>Artist Booking Preferences</title>
</head>

<body style="font-family: Arial; text-align: center;">

<h1>Artist Booking Preferences</h1>

<p>Tell us what kind of shows you want to play.</p>
<p>This helps venues understand your needs and availability.</p>

<form name="artist-preferences" method="POST" data-netlify="true">

<input type="hidden" name="form-name" value="artist-preferences">

<div style="max-width: 500px; margin: auto; text-align: center;">

<p><strong>Budget Range</strong></p>
<input type="range" name="budget" min="$0" max="$5000">

<p><strong>Music Styles</strong></p>
<label><input type="checkbox" name="style" value="Rock"> Rock</label><br>
<label><input type="checkbox" name="style" value="Jazz"> Jazz</label><br>
<label><input type="checkbox" name="style" value="Hip Hop"> Hip Hop</label><br>
<label><input type="checkbox" name="style" value="Blues"> Blues</label><br>
<label><input type="checkbox" name="style" value="Electronic"> Electronic</label><br>
<label><input type="checkbox" name="style" value="Folk"> Folk</label><br>
<label><input type="checkbox" name="style" value="Classical"> Classical</label>

<p><strong>Equipment Needed</strong></p>
<label><input type="checkbox" name="equipment" value="Microphones"> Microphones</label><br>
<label><input type="checkbox" name="equipment" value="Speakers"> Speakers</label><br>
<label><input type="checkbox" name="equipment" value="Monitors"> Monitors</label>
<label><input type="checkbox" name="equipment" value="Cables"> Cables</label>


<p><strong>Available Days</strong></p>
<label><input type="checkbox" name="day" value="Mon"> Mon</label>
<label><input type="checkbox" name="day" value="Tue"> Tue</label>
<label><input type="checkbox" name="day" value="Wed"> Wed</label>
<label><input type="checkbox" name="day" value="Thu"> Thu</label>
<label><input type="checkbox" name="day" value="Fri"> Fri</label>
<label><input type="checkbox" name="day" value="Sat"> Sat</label>
<label><input type="checkbox" name="day" value="Sun"> Sun</label>

<br><br>

<button type="submit">Save Preferences</button>

</div>

</form>

<br>
<a href="contact.html">Continue to Contact</a>

</body>
</html>

</html>
