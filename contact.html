<body style="background:#F5F0E6; font-family: Arial, sans-serif; text-align:center; margin:0;">

<nav class="main-nav" style="background-color:#5A1622; padding:10px; text-align:center;">
  <div style="color:#F5F0E6; font-weight:bold; display:inline-block; margin-right:12px;">

  <a href="index.html" style="color:#F5F0E6; text-decoration:none; margin:0 8px;">Home</a>

<div class="page-container">
  <h1>Contact Us</h1>

  <form name="contact" method="POST" netlify data-netlify="true">
    <input type="hidden" name="form-name" value="contact">

    <p>
      <label>Name:<br>
      <input type="text" name="name"></label>
    </p>

    <p>
      <label>Email:<br>
      <input type="email" name="email"></label>
    </p>

    <p>
      <label>Message:<br>
      <textarea name="message"></textarea></label>
    </p>

    <p>
      <button type="submit">Send</button>
    </p>
  </form>
</div>
<footer>
  <p>© 2026 Book Your Band</p>
  <p>Connecting Artists and Venues for Live Music</p>
</footer>
