<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Request a Booking</title>
</head>

<body style="font-family: Arial; text-align: center;">

<h1>Request a Booking</h1>

<div style="max-width: 500px; margin: auto; text-align: left;">

<form name="booking-request" method="POST" data-netlify="true">

<input type="hidden" name="form-name" value="booking-request">

<p>
<label>Name:<br>
<input type="text" name="name" required></label>
</p>

<p>
<label>Email:<br>
<input type="email" name="email" required></label>
</p>

<p>
<label>Are you Artist or Venue?<br>
<input type="text" name="type"></label>
</p>

<p>
<label>Details:<br>
<textarea name="details"></textarea></label>
</p>

<p>
<button type="submit">Submit</button>
</p>

</form>

</div>

</body>
</html>
