<!DOCTYPE html>
<html>
<head>
  <title>Apply as an Artist</title>
</head>
<body>
<body style="font-family: Arial; text-align: center;">
<h1>Apply to Join Our Platform</h1>
<p>We are currently inviting artists to express interest in joining our booking platform.</p>

<form name="artist-application" method="POST" data-netlify="true" netlify>
<div style="max-width: 500px; margin: auto;">
  </div>
  <input type="hidden" name="form-name" value="artist-application">

  <p>
    <label>Artist / Band Name:<br>
    <input type="text" name="name" required></label>
  </p>

  <p>
    <label>Email:<br>
    <input type="email" name="email" required></label>
  </p>

  <p>
    <label>Genre:<br>
    <input type="text" name="genre"></label>
  </p>

  <p>
    <label>City:<br>
    <input type="text" name="city"></label>
  </p>

  <p>
    <label>Website or Social Media:<br>
    <input type="text" name="link"></label>
  </p>

  <p>
    <label>Tell us about yourself:<br>
    <textarea name="message"></textarea></label>
  </p>

  <p>
    <button type="submit">Submit Application</button>
  </p>

</form>

</body>
</html>
