<!DOCTYPE html>
<html>
<head>
  <title>Apply as an Artist</title>
</head>
<body style="font-family: Arial; text-align: center; background:#f4f4f4;">

<h1>Apply to Join Our Platform</h1>
<p>We are currently inviting artists to express interest in joining our booking platform.</p>

<div style="max-width: 500px; margin: auto; background:white; padding:20px; border-radius:10px;">
  <form name="artist-application" method="POST" data-netlify="true">
  <input type="hidden" name="form-name" value="artist-application">

  <h2>Apply as an Artist</h2>

  <p>
    <label>Artist / Band Name:<br>
    <input type="text" name="artist_name" required></label>
  </p>

  <p>
    <label>Email Address:<br>
    <input type="email" name="email" required></label>
  </p>

  <p>
    <label>Phone Number:<br>
    <input type="text" name="phone"></label>
  </p>

  <p>
    <label>City:<br>
    <input type="text" name="city"></label>
  </p>

  <p>
    <label>Country:<br>
    <input type="text" name="country"></label>
  </p>

  <p>
    <label>YouTube LIVE Performance Video:<br>
    <input type="url" name="video" required></label>
  </p>

  <p style="font-size:14px;">
    Please include at least one recent LIVE performance video (YouTube preferred).
  </p>

  <p>
    <button type="submit">Submit Application</button>
  </p>

  <p style="font-size:14px;">
    We review every submission. Selected artists will be contacted.
  </p>

</form>

</div>

</body>
</html>
