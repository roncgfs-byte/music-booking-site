<!DOCTYPE html>
<html>
<head>
  <title>Apply as an Artist</title>
</head>
<body style="font-family: Arial; text-align: center; background:#f4f4f4;">

<h1>Apply as an Artist</h1>
<p>Join our platform to be considered for live music bookings.</p>

<div style="max-width: 500px; margin: auto; background:white; padding:20px; border-radius:10px;">
 <form name="artist-application" method="POST" data-netlify="true">
  <input type="hidden" name="form-name" value="artist-application">
  <p>
  <label>Genre:<br>
  <input type="text" name="genre" placeholder="e.g. Rock, Jazz, Acoustic"></label>
</p>

<p>
  <label>Website or Social Media:<br>
  <input type="text" name="link" placeholder="Spotify, Instagram, Website"></label>
</p>

<p>
  <label>Short Bio:<br>
  <textarea name="bio" placeholder="Tell us about your music and experience"></textarea></label>
</p>
  <p>
    <label>Artist / Band Name:<br>
    <input type="text" name="artist_name" required></label>
  </p>

  <p>
    <label>Email Address:<br>
    <input type="email" name="email" required></label>
  </p>

  <p>
    <label>Phone Number:<br>
    <input type="text" name="phone"></label>
  </p>

  <p>
    <label>City:<br>
    <input type="text" name="city"></label>
  </p>

  <p>
    <label>Country:<br>
    <input type="text" name="country"></label>
  </p>

  <p>
    <label>YouTube Performance Video:<br>
    <input type="url" name="video"></label>
  </p>

  <p>
    <label>Music Link (optional):<br>
    <input type="url" name="music"></label>
  </p>

  <p>
    <label>Short Description:<br>
    <textarea name="bio"></textarea></label>
  </p>

  <p>
    <button type="submit">Submit</button>
  </p>

  <p style="font-size:14px;">
    We review every submission. Selected artists will be contacted.
  </p>

</form> 
</div>

</body>
</html>
