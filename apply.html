<h1>Sign Up as an Artist</h1>
<p>Join our platform to be considered for live music bookings.</p>

<div style="max-width: 500px; margin: auto; background:#F5F0E6; padding:20px; border-radius:10px;">
<form name="artist-application" method="POST" data-netlify="true" action="thank-you.html">
<input type="hidden" name="form-name" value="artist-application">

<p>Profile page – takes under 2 minutes

<p>
  <label>Artist / Band Name:<br>
  <input type="text" name="artist_name" required></label>
</p>

<p>
  <label>Email:<br>
  <input type="email" name="email" required></label>
</p>

<p>
  <label>Phone Number:<br>
  <input type="text" name="phone"></label>
</p>

<p>
  <label>City:<br>
  <input type="text" name="city"></label>
</p>



<p>
  <label>Website or Social Media:<br>
  <input type="text" name="link"></label>
</p>

<p>
  <label>YouTube Live Performance:<br>
  <input type="url" name="video" ></label>
</p>

</div>
<h2>Budget</h2>
<input type="number" min="100" max="2000">

<h2>Music Styles</h2>
<label><input type="checkbox"> Originals</label><br>
<label><input type="checkbox"> Covers</label><br>
<label><input type="checkbox"> Acoustic</label><br>  
<label><input type="checkbox"> Piano</label><br>
<label><input type="checkbox"> Dualing Pianos</label><br>  
<label><input type="checkbox"> Rock</label><br>
<label><input type="checkbox"> Jazz</label><br>
<label><input type="checkbox"> Pop</label><br>
<label><input type="checkbox"> Blues</label><br>
<label><input type="checkbox"> Electronic</label><br>
<label><input type="checkbox"> Folk</label><br>
<label><input type="checkbox"> Irish Jig</label><br>  
<label><input type="checkbox"> Rap</label><br>  
<label><input type="checkbox"> Classical</label>

<h2>Equipment List</h2>
<label><input type="checkbox"> Microphones</label><br>
<label><input type="checkbox"> Speakers</label><br>
<label><input type="checkbox"> Monitors</label>
<label><input type="checkbox"> Cable</label>

<h2>Available Days</h2>
<label><input type="checkbox"> Mon</label>
<label><input type="checkbox"> Tue</label>
<label><input type="checkbox"> Wed</label>
<label><input type="checkbox"> Thu</label>
<label><input type="checkbox"> Fri</label>
<label><input type="checkbox"> Sat</label>
<label><input type="checkbox"> Sun</label>
  
 <div style="text-align: center; margin-top: 25px;">
  <button type="submit" class="submit-btn">
    Save
  </button>
</div>

</form>

  
</body>
</html>
