<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Venue Preferences</title>
</head>

<body style="font-family: Arial;">

<form name="venue-preferences" method="POST" data-netlify="true">
<input type="hidden" name="form-name" value="venue-preferences">

<div style="max-width: 600px; margin: auto; text-align: center;">

  <h1>Venue Booking Details</h1>
  <p>Provide additional information to help us match you with the right artists.</p>

  <p>
    <label>Email (same as application):<br>
    <input type="email" name="email" required></label>
  </p>

  <p>
    <label>Venue Type:<br>
    <input type="text" name="venue_type"></label>
  </p>

  <p>
    <label>Capacity:<br>
    <input type="text" name="capacity"></label>
  </p>

  <p>
    <label>Preferred Music Styles:<br>
    <input type="text" name="music_styles"></label>
  </p>

  <p>
    <label>Event Types:<br>
    <input type="text" name="event_types"></label>
  </p>

  <p>
    <label>Typical Budget:<br>
    <input type="text" name="budget"></label>
  </p>

  <p>
    <label>Available Dates:<br>
    <input type="text" name="availability"></label>
  </p>

  <p>
    <label>Stage / Sound Info:<br>
    <textarea name="tech"></textarea></label>
  </p>

  <p>
    <button type="submit">Submit Details</button>
  </p>

</div>

</form>

</body>
</html>
